        const found = studentData.filter(s => s.name === searchTerm.replace(/\s+/g, ''));
        setResults(found);
        setHasSearched(true);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">

                <input
                  type="text"
                  className="flex-1 px-4 py-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
                  placeholder="이름 입력 (예: 장원)"
                  value={searchTerm}
                  onChange={(e) => { setSearchTerm(e.target.value); setHasSearched(false); }}
                  onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                />
                <button onClick={handleSearch} className="px-5 bg-blue-600 text-white rounded-lg font-bold"><Search /></button>
              </div>
              {hasSearched && (
                <div className="animate-fade-in-up">
                  {results.length > 0 ? (
                    results.map((s, i) => (
                      <div key={i} className="bg-blue-50 border border-blue-100 rounded-xl p-6 text-center mb-3">
                        <div className="text-blue-800 font-medium text-sm mb-1">{s.dept}</div>
                        <div className="text-xl font-bold mb-3">{s.name} <span className="text-gray-500 font-normal">학생</span></div>
                        <div className="inline-block bg-blue-600 text-white px-8 py-2 rounded-full text-2xl font-black">{s.team}</div>
                      </div>
                    ))
                  ) : (
                    <div className="text-center py-8 text-gray-400">결과를 찾을 수 없습니다.</div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
