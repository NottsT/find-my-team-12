        const searchName = searchTerm.replace(/\s+/g, '');
        const found = studentData.filter(student => student.name === searchName);
        setResults(found);
        setHasSearched(true);
      };

                  value={searchTerm}
                  onChange={(e) => { setSearchTerm(e.target.value); setHasSearched(false); }}
                  onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                />
                <button 
                  onClick={handleSearch} 
                  className="absolute inset-y-1 right-1 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-md font-medium transition-colors"

                </button>
              </div>

                        <div key={i} className="bg-blue-50 border border-blue-100 rounded-xl p-5 flex flex-col items-center text-center">
