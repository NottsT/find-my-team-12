    function App() {
      const [term, setTerm] = useState("");
      const [res, setRes] = useState([]);
      const [done, setDone] = useState(false);

      const find = () => {
        if (!term.trim()) return;
        const result = DATA.filter(s => s.n === term.trim().replace(/\s/g, ""));
        setRes(result);
        setDone(true);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div className="bg-gradient-to-br from-blue-600 to-blue-700 p-8 text-white text-center">

              <p className="mt-2 opacity-80 text-sm">이름을 입력해 팀 배정을 확인하세요.</p>
            </div>
            <div className="p-6">
              <div className="flex gap-2 mb-8">
                <input
                  type="text"
                  className="flex-1 px-4 py-3 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all"
                  placeholder="이름 (예: 김민정)"
                  value={term}
                  onChange={e => {setTerm(e.target.value); setDone(false);}}
                  onKeyDown={e => e.key === "Enter" && find()}
                />
                <button onClick={find} className="bg-blue-600 hover:bg-blue-700 text-white px-6 rounded-2xl font-bold transition-transform active:scale-95">조회</button>
              </div>
              {done && (
                <div className="animate-fade-in-up">
                  {res.length > 0 ? res.map((s, i) => (
                    <div key={i} className="bg-blue-50 border-2 border-blue-100 rounded-2xl p-6 text-center shadow-inner">
                      <div className="text-blue-600 font-bold text-xs mb-1">{s.d}</div>
                      <div className="text-2xl font-black text-gray-800 mb-4">
                        {s.n}{s.s && ` (${s.s})`} <span className="text-gray-400 font-normal text-lg">학생</span>
                      </div>
                      <div className="inline-block bg-blue-600 text-white px-10 py-3 rounded-full text-3xl font-black shadow-lg uppercase">{s.t}</div>
                    </div>
                  )) : (
                    <div className="text-center py-10 text-gray-300 font-bold bg-gray-50 rounded-2xl border-2 border-dashed">명단에 없습니다.</div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
