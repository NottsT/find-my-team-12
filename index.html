    function App() {
      const [term, setTerm] = useState("");
      const [results, setResults] = useState([]);
      const [searched, setSearched] = useState(false);

      const search = () => {
        const input = term.trim().replace(/\s/g, "");
        if (!input) return;
        const found = STUDENT_DATA.filter(s => s.name === input);
        setResults(found);
        setSearched(true);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div className="bg-blue-600 p-8 text-white text-center">
              <h1 className="text-3xl font-black mb-1">나의 팀 찾기</h1>
              <p className="opacity-80">이름을 입력하여 팀을 조회하세요.</p>
            </div>
            
            <div className="p-6">
              <div className="flex gap-2 mb-6">
                <input
                  type="text"
                  className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none text-lg transition-all"
                  placeholder="이름 (예: 김민정)"
                  value={term}
                  onChange={e => { setTerm(e.target.value); setSearched(false); }}
                  onKeyDown={e => e.key === "Enter" && search()}
                />
                <button onClick={search} className="bg-blue-600 text-white px-5 rounded-xl hover:bg-blue-700 transition-colors">
                  <SearchIcon />
                </button>
              </div>

              {searched && (
                <div className="animate-fade-in-up">
                  {results.length > 0 ? (
                    results.map((s, i) => (
                      <div key={i} className="bg-blue-50 border-2 border-blue-100 rounded-2xl p-6 text-center mb-4">
                        <div className="text-blue-800 text-sm font-bold mb-1">{s.dept}</div>
                        <div className="text-2xl font-bold mb-4">
                          {s.name}{s.id && ` (${s.id})`} <span className="text-gray-400 font-normal">학생</span>
                        </div>
                        <div className="inline-block bg-blue-600 text-white px-10 py-3 rounded-full text-3xl font-black shadow-lg">
                          {s.team}
                        </div>
                      </div>
                    ))
                  ) : (
                    <div className="text-center py-10 text-gray-400 font-bold border-2 border-dashed border-gray-100 rounded-2xl">
                      명단에 없습니다. <br/> 이름을 다시 확인해주세요!
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
